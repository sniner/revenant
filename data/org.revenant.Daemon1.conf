<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<!--
  System-bus access policy for org.revenant.Daemon1.

  Installed to: /usr/share/dbus-1/system.d/org.revenant.Daemon1.conf

  Owning the bus name is restricted to root (the daemon itself);
  client side, any user may call methods and receive signals.
  Authorization for individual actions is delegated to polkit
  (see org.revenant.policy).
-->
<busconfig>
  <policy user="root">
    <allow own="org.revenant.Daemon1"/>
    <allow send_destination="org.revenant.Daemon1"/>
    <allow receive_sender="org.revenant.Daemon1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.revenant.Daemon1"/>
    <allow receive_sender="org.revenant.Daemon1"/>
  </policy>
</busconfig>
