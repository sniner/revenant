name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --all --all-targets --locked -- -D warnings

      - name: cargo clippy (loopback-tests feature)
        run: cargo clippy --all --all-targets --locked
             --features revenant-core/loopback-tests -- -D warnings

  test-unit:
    name: Layer A — unit & orchestration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all --locked

  test-loopback:
    name: Layer B — loopback btrfs tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install btrfs userspace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y btrfs-progs

      - name: Run loopback test suite
        run: ./tools/run-loopback-tests.sh

      - name: Verify cleanup left no traces
        run: |
          if [ -e /tmp/revenant-loopback-test ]; then
            echo "ERROR: sandbox dir still exists after run"
            ls -la /tmp/revenant-loopback-test
            exit 1
          fi
          if sudo losetup -a | grep -q revenant-loopback-test; then
            echo "ERROR: stale loop device(s) bound to sandbox files"
            sudo losetup -a
            exit 1
          fi
          echo "OK: no leftover sandbox state"

  build-check:
    name: Release build (default toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --locked -p revenant-cli
