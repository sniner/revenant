name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    # Tag-pushes only: refuse to build a release whose git tag does not
    # match `[workspace.package].version` in the workspace Cargo.toml.
    # Catches the common "tagged v0.2.0 but forgot to bump Cargo.toml"
    # mistake before any build minutes are spent.
    name: Verify tag matches workspace version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare git tag with [workspace.package].version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Same extractor the PKGBUILD uses — keep them in lockstep.
          ws=$(awk '
              /^\[workspace\.package\]/ { in_pkg=1; next }
              /^\[/                     { in_pkg=0 }
              in_pkg && /^[[:space:]]*version[[:space:]]*=/ {
                  gsub(/^[[:space:]]*version[[:space:]]*=[[:space:]]*"/, "")
                  gsub(/".*$/, "")
                  print
                  exit
              }
          ' Cargo.toml)
          echo "Git tag (stripped):  $tag"
          echo "Workspace version:   $ws"
          if [ "$tag" != "$ws" ]; then
              echo "::error::Git tag v$tag does not match [workspace.package].version $ws — bump Cargo.toml before tagging."
              exit 1
          fi
          echo "OK: tag and workspace version match."

  build:
    name: Build ${{ matrix.target }}
    needs: verify-version
    # Run when the gate passed, or when it was skipped (workflow_dispatch
    # with no tag — useful as a manual smoke build).
    if: ${{ always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            apt_packages: musl-tools
            asset_suffix: x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            apt_packages: musl-tools
            asset_suffix: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install apt packages
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build revenantctl
        run: cargo build --release --locked
             --target ${{ matrix.target }}
             -p revenant-cli

      - name: Verify static linkage
        if: contains(matrix.target, 'musl')
        run: |
          BIN=target/${{ matrix.target }}/release/revenantctl
          file "$BIN"
          # file(1) reports musl binaries as "statically linked" (classic)
          # or "static-pie linked" (modern PIE). Accept both.
          if ! file "$BIN" | grep -qE "static(ally|-pie)? linked"; then
            echo "ERROR: revenantctl is not statically linked"
            exit 1
          fi
          echo "OK: $(du -h "$BIN" | cut -f1) statically linked binary"

      - name: Strip release binary
        run: strip target/${{ matrix.target }}/release/revenantctl

      - name: Stage binary with versioned name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/revenantctl" \
             "dist/revenantctl-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: revenantctl-${{ matrix.asset_suffix }}
          path: dist/revenantctl-*
          if-no-files-found: error
          retention-days: 7

  arch-package:
    name: Build Arch packages (x86_64)
    needs: verify-version
    if: ${{ always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') }}
    runs-on: ubuntu-latest
    container:
      # base-devel ships makepkg, fakeroot, sudo, git — everything
      # the build needs except the actual rust + gtk toolchain we
      # install below.
      image: archlinux:base-devel
    steps:
      - name: Refresh pacman databases
        run: pacman -Sy --noconfirm

      - name: Install build dependencies
        # Pre-installing makedepends here means makepkg does not need
        # --syncdeps (which requires sudo and would just call pacman
        # again under a wrapper). `git` is required for actions/checkout.
        run: pacman -S --noconfirm --needed git rust gtk4 libadwaita

      - uses: actions/checkout@v4

      - name: Set up build user
        # makepkg refuses to run as root; create an unprivileged user
        # and hand it the workspace.
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder .

      - name: Build packages
        # `-f` overwrites any leftover .pkg.tar.zst from a re-run.
        # No `-s` because we already installed the makedepends above.
        run: |
          cd packaging/arch
          sudo -u builder makepkg --noconfirm -f

      - name: Stage assets
        run: |
          mkdir -p dist
          cp packaging/arch/*.pkg.tar.zst dist/
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages-x86_64
          path: dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, arch-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tagged commit's full message for release notes;
          # default shallow clone strips the body.
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release notes = body of the tagged release-prep commit,
          # minus the Co-Authored-By trailer.
          git log -1 --pretty=%b "$GITHUB_REF_NAME" \
            | sed '/^Co-Authored-By:/d' > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            dist/revenantctl-* dist/*.pkg.tar.zst
